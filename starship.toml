'$schema' = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$cmd_duration\
$rust\
$golang\
$nodejs\
$php\
$python\
$time\
$line_break\
$character
"""

palette = 'catppuccin_mocha'

command_timeout = 1000

[directory]
style = 'fg:blue'
format = '[$path]($style)'
truncation_length = 100
truncate_to_repo = false

# [custom.git_rebase_onto]
# command = 'cut -c1-8 .git/rebase-merge/onto'
# when = 'test -f .git/rebase-merge/onto'
# style = 'fg:green'
# format = ' @[$output]($style)'

[git_branch]
symbol = ''
format = '[$symbol $branch](fg:green)'

[git_state]
rebase = 'rebase'
merge = 'merge'
style = 'fg:red'
format = '[ $state( $progress_current/$progress_total) ]($style)'

[git_status]
format = '$all_status$ahead_behind'
conflicted = '[ ~$count](fg:red)'
stashed = '[ *$count](fg:green)'
untracked = '[ ?$count](fg:blue)'
modified = ' !$count'
staged = '[ +$count](fg:yellow)'
renamed = ''
deleted = ''
ignore_submodules = true

[nodejs]
symbol = ''
format = '[ $symbol( $version) ](fg:green)'
detect_files = ['package.json', '.nvmrc', '.node-version']

[rust]
symbol = ''
format = '[ $symbol( $version) ](fg:red)'

[golang]
symbol = ''
format = '[ $symbol( $version) ](fg:blue)'

[php]
symbol = ''
format = '[ $symbol( $version) ](fg:sky)'

[python]
symbol = ''
format = '[ $symbol( $version)(\(#$virtualenv\)) ](fg:sapphire)'

[docker_context]
symbol = ''
style = 'bg:sapphire'
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[fill]
symbol = ' '
[time]
disabled = false
time_format = '%R'
style = 'fg:lavender'
format = '[$time ]($style)'

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
format = '[$duration]($style) '
style = 'fg:overlay0'
disabled = false
min_time_to_notify = 45000

[palettes.catppuccin_mocha]
rosewater = '#f5e0dc'
flamingo = '#f2cdcd'
pink = '#f5c2e7'
mauve = '#cba6f7'
red = '#f38ba8'
maroon = '#eba0ac'
peach = '#fab387'
yellow = '#f9e2af'
green = '#a6e3a1'
teal = '#94e2d5'
sky = '#89dceb'
sapphire = '#74c7ec'
blue = '#89b4fa'
lavender = '#b4befe'
text = '#cdd6f4'
subtext1 = '#bac2de'
subtext0 = '#a6adc8'
overlay2 = '#9399b2'
overlay1 = '#7f849c'
overlay0 = '#6c7086'
surface2 = '#585b70'
surface1 = '#45475a'
surface0 = '#313244'
base = '#1e1e2e'
mantle = '#181825'
crust = '#11111b'
